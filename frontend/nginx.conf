server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-XSS-Protection        "1; mode=block"                  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Rspack outputs content-hashed filenames — safe to cache forever.
    location ~* \.(js|css|woff2?|png|jpe?g|gif|svg|ico|webp|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Backend API proxy ─────────────────────────────────────────────────────
    # The SPA calls /api/v1/... → nginx forwards to the backend container.
    # This avoids exposing the backend port externally and eliminates CORS in prod.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Backend health passthrough ────────────────────────────────────────────
    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All unmatched paths serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
