# Development compose — run with: docker compose -f docker-compose.dev.yml up --build
#
# Differences from prod:
#  • Backend port 8000 is published so you can hit the API directly / Swagger UI.
#  • Backend source is mounted as a volume; uvicorn runs with --reload.
#  • Sensible defaults mean you need no .env file to get started.
#  • No resource limits — use whatever the dev machine has.

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    command: >
      sh -c "python -m app.seed &&
      uvicorn app.main:app
      --host 0.0.0.0
      --port ${PORT:-8000}
      --reload
      --reload-dir /app/app
      --reload-include '*.py'"
    user: root
    volumes:
      - ./backend/app:/app/app
      - dev_db_data:/app/data
    env_file:
      - ./backend/.env
    environment:
      # Docker-internal watcher — not app config, so kept here not in .env
      WATCHFILES_FORCE_POLLING: "true"
    networks:
      - app_net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm dev"
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    volumes:
      - ./frontend:/app # mount entire frontend so edits are live
      - /app/node_modules # anonymous volume prevents host node_modules overwriting container's
    env_file:
      - ./frontend/.env
    environment:
      # Force polling for all file watchers inside Docker on Windows hosts.
      # Native inotify events don't reach the container over the WSL2 volume mount.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "200"
      WATCHPACK_POLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_net

volumes:
  dev_db_data:

networks:
  app_net:
    driver: bridge
