# Production compose — deployed via Coolify on a VPS.
#
# Key decisions:
#  • backend is NOT published to the host; nginx proxies /api/ internally.
#  • A named volume persists the SQLite database across deployments.
#  • Environment Variables UI are injected at runtime.
#  • 'deploy.resources' caps memory so one service can't starve the VPS.

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "${PORT:-8000}" # expose to other containers, but not the host
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      - db_data:/app/data # persist DB between deployments
    networks:
      - app_net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8000}/health')",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s # allow time for DB seed on first boot
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env.prod
    ports:
      - "${FRONTEND_PORT:-80}:80"

    depends_on:
      backend:
        condition: service_healthy # wait until /health returns 200 before accepting traffic
    restart: unless-stopped
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 32m

# ── Shared resources ──────────────────────────────────────────────────────────
volumes:
  db_data:

networks:
  app_net:
    driver: bridge
